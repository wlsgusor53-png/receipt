<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현장장부</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #0f0f0f; --paper: #f7f5f0; --cream: #edeae2; --line: #d4d0c8;
  --muted: #9b9890; --accent: #d4522a; --accent2: #2a7d4f;
  --mono: 'DM Mono', monospace; --sans: 'Noto Sans KR', sans-serif; --display: 'Bebas Neue', sans-serif;
}
html, body { min-height: 100vh; background: var(--paper); }
body { font-family: var(--sans); color: var(--ink); max-width: 560px; margin: 0 auto; padding: 0 0 80px; }
.site-header { padding: 32px 24px 20px; border-bottom: 2px solid var(--ink); display: flex; align-items: flex-end; justify-content: space-between; }
.site-header h1 { font-family: var(--display); font-size: 42px; letter-spacing: 1px; line-height: 1; }
.site-header .sub { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: right; line-height: 1.6; }
.section { padding: 24px; border-bottom: 1px solid var(--line); }
.drop-area { border: 1.5px dashed var(--line); border-radius: 4px; padding: 32px 20px; text-align: center; background: var(--cream); cursor: pointer; position: relative; transition: border-color 0.2s, background 0.2s; }
.drop-area.drag { border-color: var(--accent); background: #fdf0ec; }
.drop-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.drop-icon { width: 40px; height: 40px; border: 1.5px solid var(--line); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 18px; background: white; }
.drop-area p { font-size: 13px; color: var(--muted); line-height: 1.7; }
.drop-area strong { color: var(--ink); font-weight: 500; }
.file-list { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
.file-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: white; border: 0.5px solid var(--line); border-radius: 4px; font-size: 13px; }
.file-status { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; font-family: var(--mono); font-weight: 500; }
.file-status.waiting { background: var(--cream); color: var(--muted); border: 1px solid var(--line); }
.file-status.scanning { background: #fff8e6; border: 1px solid #f0c040; color: #b08000; animation: pulse 1s infinite; }
.file-status.done { background: #e8f5ee; border: 1px solid #a0d4b4; color: var(--accent2); }
.file-status.error { background: #fcecea; border: 1px solid #f5b7b1; color: var(--accent); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
.file-size { font-family: var(--mono); font-size: 10px; color: var(--muted); flex-shrink: 0; }
.file-remove { color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; flex-shrink: 0; }
.file-remove:hover { color: var(--accent); }
.progress-section { padding: 20px 24px; border-bottom: 1px solid var(--line); display: none; }
.progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.progress-label { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.progress-count { font-family: var(--display); font-size: 28px; color: var(--ink); line-height: 1; }
.progress-track { height: 3px; background: var(--line); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 3px; background: var(--accent); border-radius: 99px; width: 0%; transition: width 0.4s; }
.progress-current { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 8px; }
.btn-wrap { padding: 20px 24px 0; }
.btn-start { width: 100%; background: var(--ink); color: white; border: none; border-radius: 4px; padding: 16px; font-family: var(--display); font-size: 20px; letter-spacing: 1px; cursor: pointer; transition: opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-start:hover:not(:disabled) { opacity: 0.85; }
.btn-start:disabled { opacity: 0.3; cursor: not-allowed; }
.error-bar { margin: 16px 24px 0; padding: 12px 16px; background: #fcecea; border-left: 3px solid var(--accent); border-radius: 0 4px 4px 0; font-size: 12px; color: #8b2020; display: none; font-family: var(--mono); word-break: break-all; line-height: 1.6; }
.results-section { display: none; }
.results-header { padding: 24px 24px 16px; border-bottom: 1px solid var(--line); }
.results-title { font-family: var(--display); font-size: 13px; letter-spacing: 2px; color: var(--muted); margin-bottom: 16px; }
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
.stat-box { background: white; padding: 14px 12px; }
.stat-box .lbl { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-bottom: 4px; }
.stat-box .val { font-family: var(--mono); font-size: 14px; font-weight: 500; }
.stat-box.income .val { color: var(--accent2); }
.stat-box.expense .val { color: var(--accent); }
.table-wrap { padding: 0 24px 16px; }
.table-label { font-size: 10px; font-family: var(--mono); letter-spacing: 2px; color: var(--muted); padding: 16px 0 8px; text-transform: uppercase; }
.ledger { width: 100%; border-collapse: collapse; }
.ledger thead tr { border-bottom: 2px solid var(--ink); }
.ledger thead th { font-family: var(--mono); font-size: 9px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 0 0 8px; text-align: left; }
.ledger thead th:last-child, .ledger thead th:nth-child(4) { text-align: right; }
.ledger tbody tr { border-bottom: 0.5px solid var(--line); }
.ledger tbody tr:hover { background: var(--cream); }
.ledger tbody td { padding: 11px 0; font-size: 12px; vertical-align: middle; }
.td-date { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 52px; }
.td-desc { padding-right: 8px; }
.td-cat { width: 60px; padding-right: 8px; }
.cat-pill { display: inline-block; font-size: 9px; font-family: var(--mono); padding: 2px 6px; border-radius: 2px; background: var(--cream); color: var(--muted); white-space: nowrap; }
.td-amount { font-family: var(--mono); font-size: 11px; font-weight: 500; text-align: right; width: 80px; }
.td-amount.income { color: var(--accent2); }
.td-amount.expense { color: var(--accent); }
.td-type { width: 32px; text-align: right; }
.type-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.type-dot.in { background: var(--accent2); }
.type-dot.out { background: var(--accent); }
.action-row { display: flex; gap: 10px; padding: 16px 24px 0; }
.btn-action { flex: 1; padding: 12px; border-radius: 4px; font-size: 13px; font-family: var(--sans); font-weight: 500; cursor: pointer; border: 1px solid var(--line); background: white; color: var(--ink); transition: all 0.15s; }
.btn-action:hover { background: var(--cream); }
.btn-action.primary { background: var(--ink); color: white; border-color: var(--ink); }
.btn-action.primary:hover { opacity: 0.85; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--ink); color: white; padding: 10px 20px; border-radius: 99px; font-size: 12px; font-family: var(--mono); transition: transform 0.3s; z-index: 100; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header class="site-header">
  <h1>현장장부</h1>
  <div class="sub">영수증 → 장부 자동변환<br>AI-powered ledger</div>
</header>
<div class="section">
  <div class="drop-area" id="dropArea">
    <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.pdf,.webp">
    <div class="drop-icon">+</div>
    <p><strong>파일을 여기에 드래그</strong>하거나 클릭해서 선택<br>영수증 · 세금계산서 · 거래명세서</p>
  </div>
  <div class="file-list" id="fileList"></div>
</div>
<div class="btn-wrap">
  <button class="btn-start" id="startBtn" disabled>분석 시작</button>
</div>
<div class="error-bar" id="errorBar"></div>
<div class="progress-section" id="progressSection">
  <div class="progress-header">
    <div>
      <div class="progress-label">분석 진행</div>
      <div class="progress-count" id="progressCount">0 / 0</div>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-current" id="progressCurrent"></div>
</div>
<div class="results-section" id="resultsSection">
  <div class="results-header">
    <div class="results-title">분석 결과</div>
    <div class="stats-row">
      <div class="stat-box income"><div class="lbl">총 입금</div><div class="val" id="statIncome">₩0</div></div>
      <div class="stat-box expense"><div class="lbl">총 출금</div><div class="val" id="statExpense">₩0</div></div>
      <div class="stat-box"><div class="lbl">순이익</div><div class="val" id="statNet">₩0</div></div>
    </div>
  </div>
  <div class="table-wrap">
    <div class="table-label">거래 내역</div>
    <table class="ledger">
      <thead>
        <tr>
          <th>날짜</th><th>내용</th><th>분류</th>
          <th style="text-align:right">금액</th>
          <th style="text-align:right">구분</th>
        </tr>
      </thead>
      <tbody id="ledgerBody"></tbody>
    </table>
  </div>
  <div class="action-row">
    <button class="btn-action" onclick="resetApp()">↩ 다시 분석</button>
    <button class="btn-action primary" onclick="exportPDF()">PDF 저장</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API_KEY = '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';

let files = [], ledgerData = [], isRunning = false;

const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const startBtn = document.getElementById('startBtn');
const errorBar = document.getElementById('errorBar');
const progressSection = document.getElementById('progressSection');
const progressFill = document.getElementById('progressFill');
const progressCount = document.getElementById('progressCount');
const progressCurrent = document.getElementById('progressCurrent');
const resultsSection = document.getElementById('resultsSection');

dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag'));
dropArea.addEventListener('drop', e => { e.preventDefault(); dropArea.classList.remove('drag'); addFiles([...e.dataTransfer.files]); });
fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return Math.round(bytes/1024) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}

function addFiles(newFiles) {
  newFiles.forEach(f => { if (!files.find(x => x.name === f.name)) files.push(f); });
  renderFileList();
  startBtn.disabled = files.length === 0;
}

function removeFile(name) {
  if (isRunning) return;
  files = files.filter(f => f.name !== name);
  renderFileList();
  startBtn.disabled = files.length === 0;
}

function renderFileList(statuses = {}) {
  fileList.innerHTML = files.map(f => {
    const s = statuses[f.name] || 'waiting';
    const icons = { waiting: '·', scanning: '↻', done: '✓', error: '!' };
    return `<div class="file-item">
      <div class="file-status ${s}">${icons[s]}</div>
      <div class="file-name">${f.name}</div>
      <div class="file-size">${formatSize(f.size)}</div>
      ${s === 'waiting' ? `<span class="file-remove" onclick="removeFile('${f.name}')">×</span>` : ''}
    </div>`;
  }).join('');
}

async function compressImage(file) {
  return new Promise((res, rej) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      const b64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
      if (!b64) { rej(new Error('이미지 압축 실패')); return; }
      res(b64);
    };
    img.onerror = () => rej(new Error('이미지 로드 실패: ' + file.name));
    img.src = url;
  });
}

async function fileToBase64(file) {
  if (file.type.startsWith('image/')) return compressImage(file);
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('파일 읽기 실패: ' + file.name));
    r.readAsDataURL(file);
  });
}

async function analyzeOne(file) {
  const b64 = await fileToBase64(file);
  const mt = file.type === 'application/pdf' ? 'application/pdf' : 'image/jpeg';
  const content = [];
  if (mt === 'application/pdf') {
    content.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: b64 } });
  } else {
    content.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } });
  }
  content.push({ type: 'text', text: `파일명: ${file.name}\n\n건설/시공 현장 서류입니다. 거래 내역을 추출해서 JSON만 응답하세요. 코드블록 없이 순수 JSON.\n\n{"transactions":[{"date":"YYYY-MM-DD","description":"내용(15자이내)","category":"자재비/노무비/장비비/용역비/기타수입/기타지출","amount":숫자,"type":"income또는expense"}]}\n\n날짜불명확→오늘. 금액은부가세포함. 수입→income, 지출→expense.` });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content }] })
  });

  const text = await response.text();
  let data;
  try { data = JSON.parse(text); }
  catch(e) { throw new Error('응답 파싱 실패: ' + text.slice(0, 100)); }

  if (!response.ok || data.error) {
    throw new Error('API ' + response.status + ': ' + (data?.error?.message || text.slice(0, 100)));
  }

  const raw = data.content?.[0]?.text || '';
  let parsed;
  try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
  catch(e) { throw new Error('JSON 파싱 실패: ' + raw.slice(0, 100)); }

  return parsed.transactions || [];
}

startBtn.addEventListener('click', async () => {
  if (!files.length || isRunning) return;
  isRunning = true;
  errorBar.style.display = 'none';
  startBtn.style.display = 'none';
  progressSection.style.display = 'block';
  resultsSection.style.display = 'none';
  ledgerData = [];
  const total = files.length;
  const statuses = {};
  const errors = [];

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    statuses[file.name] = 'scanning';
    renderFileList(statuses);
    progressCount.textContent = `${i + 1} / ${total}`;
    progressFill.style.width = `${Math.round((i / total) * 100)}%`;
    progressCurrent.textContent = `"${file.name.slice(0, 20)}" 분석 중...`;
    try {
      const txns = await analyzeOne(file);
      ledgerData.push(...txns);
      statuses[file.name] = 'done';
    } catch (err) {
      statuses[file.name] = 'error';
      errors.push(file.name.slice(0,10) + ': ' + (err.message || '알 수 없는 오류'));
    }
    renderFileList(statuses);
  }

  progressFill.style.width = '100%';
  progressCount.textContent = `${total} / ${total}`;
  progressCurrent.textContent = '완료';
  isRunning = false;

  if (errors.length > 0) {
    errorBar.textContent = errors.join(' | ');
    errorBar.style.display = 'block';
  }

  if (ledgerData.length === 0) return;
  renderResults();
});

function formatKRW(n) { return '₩' + Math.round(n).toLocaleString('ko-KR'); }

function renderResults() {
  resultsSection.style.display = 'block';
  const income = ledgerData.filter(d => d.type === 'income').reduce((s, d) => s + d.amount, 0);
  const expense = ledgerData.filter(d => d.type === 'expense').reduce((s, d) => s + d.amount, 0);
  const net = income - expense;
  document.getElementById('statIncome').textContent = formatKRW(income);
  document.getElementById('statExpense').textContent = formatKRW(expense);
  const netEl = document.getElementById('statNet');
  netEl.textContent = formatKRW(Math.abs(net));
  netEl.style.color = net >= 0 ? 'var(--accent2)' : 'var(--accent)';
  const sorted = [...ledgerData].sort((a, b) => new Date(b.date) - new Date(a.date));
  document.getElementById('ledgerBody').innerHTML = sorted.map(t => `
    <tr>
      <td class="td-date">${(t.date||'').slice(5)||'-'}</td>
      <td class="td-desc">${t.description}</td>
      <td class="td-cat"><span class="cat-pill">${t.category}</span></td>
      <td class="td-amount ${t.type}">${t.type==='income'?'+':'-'}${formatKRW(t.amount)}</td>
      <td class="td-type"><span class="type-dot ${t.type==='income'?'in':'out'}"></span></td>
    </tr>
  `).join('');
}

function resetApp() {
  files = []; ledgerData = []; isRunning = false;
  fileList.innerHTML = '';
  startBtn.disabled = true; startBtn.style.display = 'flex';
  progressSection.style.display = 'none'; progressFill.style.width = '0%';
  resultsSection.style.display = 'none'; errorBar.style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function exportPDF() {
  if (!ledgerData.length) return;
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    doc.setFont('helvetica');
    doc.setFontSize(22); doc.setTextColor(15, 15, 15);
    doc.text('HYEONJANG JANGBU', 14, 22);
    doc.setFontSize(9); doc.setTextColor(150);
    doc.text('Construction Ledger  /  ' + new Date().toLocaleDateString('ko-KR'), 14, 30);
    const income = ledgerData.filter(d => d.type === 'income').reduce((s, d) => s + d.amount, 0);
    const expense = ledgerData.filter(d => d.type === 'expense').reduce((s, d) => s + d.amount, 0);
    const net = income - expense;
    doc.setDrawColor(15, 15, 15); doc.setLineWidth(0.5);
    doc.line(14, 34, 196, 34);
    doc.setFontSize(9); doc.setTextColor(15, 15, 15);
    doc.text('입금  ' + formatKRW(income), 14, 41);
    doc.text('출금  ' + formatKRW(expense), 80, 41);
    doc.text('순이익  ' + formatKRW(net), 146, 41);
    doc.line(14, 45, 196, 45);
    const pdfSorted = [...ledgerData].sort((a, b) => new Date(a.date) - new Date(b.date));
    doc.autoTable({
      startY: 49,
      head: [['날짜', '내용', '분류', '금액', '구분']],
      body: pdfSorted.map(t => [t.date||'-', t.description, t.category, (t.type==='income'?'+':'-')+formatKRW(t.amount), t.type==='income'?'입금':'출금']),
      styles: { fontSize: 8, cellPadding: 3 },
      headStyles: { fillColor: [15, 15, 15], textColor: 255 },
      alternateRowStyles: { fillColor: [245, 243, 240] },
      columnStyles: { 3: { halign: 'right' }, 4: { halign: 'center' } }
    });
    doc.save('현장장부_' + new Date().toISOString().slice(0, 10) + '.pdf');
    showToast('PDF 저장 완료');
  } catch(e) { showToast('오류: ' + e.message); }
}
</script>
</body>
</html>
