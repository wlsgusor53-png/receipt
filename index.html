<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현장 장부 자동화</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3ef; --surface: #ffffff; --border: #e0dbd2;
    --text: #1a1814; --muted: #7a7469; --accent: #c17d3c;
    --accent-light: #f5e8d8; --danger: #c0392b; --success: #2e7d4f;
    --mono: 'IBM Plex Mono', monospace; --sans: 'Noto Sans KR', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 20px; max-width: 680px; margin: 0 auto; }
  .header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 28px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header span { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .upload-zone { border: 1.5px dashed var(--border); border-radius: 14px; padding: 36px 24px; text-align: center; background: var(--surface); cursor: pointer; transition: all 0.2s; margin-bottom: 16px; position: relative; }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-light); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { width: 44px; height: 44px; background: var(--accent-light); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 22px; }
  .upload-zone p { font-size: 14px; color: var(--muted); line-height: 1.7; }
  .upload-zone strong { color: var(--accent); }
  .file-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .chip { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 5px 12px 5px 10px; font-size: 12px; }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .chip-x { color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; }
  .chip-x:hover { color: var(--danger); }
  .analyze-btn { width: 100%; background: var(--text); color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 15px; font-family: var(--sans); font-weight: 500; cursor: pointer; transition: opacity 0.15s; margin-bottom: 28px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .analyze-btn:hover { opacity: 0.85; }
  .analyze-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .loading { text-align: center; padding: 40px; display: none; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: var(--muted); }
  .results { display: none; }
  .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 22px; }
  .summary-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px 14px; }
  .summary-card .label { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-family: var(--mono); }
  .summary-card .value { font-size: 15px; font-weight: 700; font-family: var(--mono); }
  .summary-card.income .value { color: var(--success); }
  .summary-card.expense .value { color: var(--danger); }
  .section-title { font-size: 11px; font-weight: 500; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .ledger-table { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .table-head { display: grid; grid-template-columns: 75px 1fr 88px 80px 56px; gap: 6px; padding: 10px 16px; background: var(--bg); border-bottom: 0.5px solid var(--border); font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .table-row { display: grid; grid-template-columns: 75px 1fr 88px 80px 56px; gap: 6px; padding: 12px 16px; border-bottom: 0.5px solid var(--border); font-size: 13px; align-items: center; transition: background 0.1s; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--bg); }
  .table-row .date { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .table-row .category { font-size: 10px; padding: 3px 7px; border-radius: 20px; background: var(--accent-light); color: var(--accent); font-family: var(--mono); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .table-row .amount { font-family: var(--mono); font-size: 12px; font-weight: 500; text-align: right; }
  .table-row .amount.income { color: var(--success); }
  .table-row .amount.expense { color: var(--danger); }
  .type-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; text-align: center; font-family: var(--mono); }
  .type-badge.in { background: #e8f5ee; color: var(--success); }
  .type-badge.out { background: #fcecea; color: var(--danger); }
  .action-row { display: flex; gap: 10px; margin-top: 4px; }
  .action-btn { flex: 1; padding: 13px; border-radius: 10px; font-size: 14px; font-family: var(--sans); font-weight: 500; cursor: pointer; border: 0.5px solid var(--border); background: var(--surface); color: var(--text); transition: all 0.15s; }
  .action-btn:hover { background: var(--bg); }
  .action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .action-btn.primary:hover { opacity: 0.88; }
  .error-msg { background: #fcecea; border: 0.5px solid #f5b7b1; border-radius: 10px; padding: 14px; font-size: 13px; color: var(--danger); margin-bottom: 16px; display: none; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: #fff; padding: 11px 22px; border-radius: 22px; font-size: 13px; transition: transform 0.3s; z-index: 100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="header">
  <h1>현장 장부 자동화</h1>
  <span>영수증 → 장부 변환</span>
</div>
<div class="upload-zone" id="uploadZone">
  <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.pdf,.webp">
  <div class="upload-icon">📄</div>
  <p><strong>클릭하거나 파일을 드래그</strong>해서 올려주세요<br>영수증, 세금계산서, 거래명세서 (JPG, PNG, PDF)</p>
</div>
<div class="file-chips" id="fileChips"></div>
<button class="analyze-btn" id="analyzeBtn" disabled><span>🔍</span> 장부로 변환하기</button>
<div class="error-msg" id="errorMsg"></div>
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p id="loadingText">서류를 분석하고 있어요...</p>
</div>
<div class="results" id="results">
  <div class="summary-cards">
    <div class="summary-card income"><div class="label">총 입금</div><div class="value" id="totalIncome">₩0</div></div>
    <div class="summary-card expense"><div class="label">총 출금</div><div class="value" id="totalExpense">₩0</div></div>
    <div class="summary-card net"><div class="label">순이익</div><div class="value" id="netAmount">₩0</div></div>
  </div>
  <div class="section-title">거래 내역</div>
  <div class="ledger-table">
    <div class="table-head"><span>날짜</span><span>내용</span><span>분류</span><span>금액</span><span>구분</span></div>
    <div id="tableBody"></div>
  </div>
  <div class="action-row">
    <button class="action-btn" onclick="resetApp()">↩ 다시 분석</button>
    <button class="action-btn primary" onclick="exportPDF()">📥 PDF 저장</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let files = [], ledgerData = [];
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const fileChips = document.getElementById('fileChips');
const analyzeBtn = document.getElementById('analyzeBtn');
const loading = document.getElementById('loading');
const results = document.getElementById('results');
const errorMsg = document.getElementById('errorMsg');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag'); addFiles([...e.dataTransfer.files]); });
fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

function addFiles(newFiles) {
  newFiles.forEach(f => { if (!files.find(x => x.name === f.name)) files.push(f); });
  renderChips(); analyzeBtn.disabled = files.length === 0;
}
function removeFile(name) {
  files = files.filter(f => f.name !== name);
  renderChips(); analyzeBtn.disabled = files.length === 0;
}
function renderChips() {
  fileChips.innerHTML = files.map(f => `<div class="chip"><div class="chip-dot"></div><span>${f.name.length > 20 ? f.name.slice(0,20)+'...' : f.name}</span><span class="chip-x" onclick="removeFile('${f.name}')">×</span></div>`).join('');
}

async function fileToBase64(file) {
  return new Promise((res, rej) => {
    if (file.type.startsWith('image/')) {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        const b64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
        if (!b64) { rej(new Error('이미지 변환 실패')); return; }
        res(b64);
      };
      img.onerror = () => rej(new Error('이미지 로드 실패: ' + file.name));
      img.src = url;
    } else {
      const r = new FileReader();
      r.onload = () => {
        const b64 = r.result.split(',')[1];
        if (!b64) { rej(new Error('파일 변환 실패')); return; }
        res(b64);
      };
      r.onerror = () => rej(new Error('파일 읽기 실패: ' + file.name));
      r.readAsDataURL(file);
    }
  });
}

function getMediaType(file) {
  if (file.type === 'application/pdf') return 'application/pdf';
  return 'image/jpeg';
}

analyzeBtn.addEventListener('click', async () => {
  if (!files.length) return;
  errorMsg.style.display = 'none';
  analyzeBtn.style.display = 'none';
  loading.style.display = 'block';
  results.style.display = 'none';
  const loadingTexts = ['서류를 분석하고 있어요...', '금액과 날짜를 추출하고 있어요...', '장부로 정리하고 있어요...'];
  let li = 0;
  const lt = setInterval(() => { document.getElementById('loadingText').textContent = loadingTexts[li++ % loadingTexts.length]; }, 2200);
  try {
    const contentParts = [];
    for (const file of files) {
      const b64 = await fileToBase64(file);
      const mt = getMediaType(file);
      if (mt === 'application/pdf') {
        contentParts.push({ type: 'document', source: { type: 'base64', media_type: mt, data: b64 } });
      } else {
        contentParts.push({ type: 'image', source: { type: 'base64', media_type: mt, data: b64 } });
      }
      contentParts.push({ type: 'text', text: `파일명: ${file.name}` });
    }
    contentParts.push({ type: 'text', text: `위 파일들은 건설/시공 현장의 영수증, 세금계산서, 거래명세서입니다. 각 서류에서 거래 내역을 추출해서 아래 JSON 형식으로만 응답하세요. 마크다운 코드블록 없이 순수 JSON만.\n\n{"transactions":[{"date":"YYYY-MM-DD","description":"거래 내용 (15자 이내)","category":"자재비/노무비/장비비/용역비/기타수입/기타지출 중 하나","amount":숫자만,"type":"income 또는 expense"}]}\n\n날짜 불명확하면 오늘 날짜. 금액은 부가세 포함 최종금액. 입금/수입이면 income, 지출/구매면 expense.` });
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: contentParts }] })
    });
    const data = await response.json();
    clearInterval(lt);
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const raw = data.content?.[0]?.text || '';
    const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    ledgerData = parsed.transactions || [];
    renderResults(ledgerData);
  } catch (err) {
    clearInterval(lt);
    loading.style.display = 'none';
    analyzeBtn.style.display = 'flex';
    errorMsg.textContent = '분석 중 오류가 발생했어요: ' + err.message;
    errorMsg.style.display = 'block';
  }
});

function formatKRW(n) { return '₩' + Math.round(n).toLocaleString('ko-KR'); }

function renderResults(data) {
  loading.style.display = 'none';
  results.style.display = 'block';
  const income = data.filter(d => d.type === 'income').reduce((s, d) => s + d.amount, 0);
  const expense = data.filter(d => d.type === 'expense').reduce((s, d) => s + d.amount, 0);
  const net = income - expense;
  document.getElementById('totalIncome').textContent = formatKRW(income);
  document.getElementById('totalExpense').textContent = formatKRW(expense);
  const netEl = document.getElementById('netAmount');
  netEl.textContent = formatKRW(Math.abs(net));
  netEl.style.color = net >= 0 ? 'var(--success)' : 'var(--danger)';
  const screenSorted = [...data].sort((a, b) => new Date(b.date) - new Date(a.date));
  document.getElementById('tableBody').innerHTML = screenSorted.map(t => `<div class="table-row"><span class="date">${(t.date||'').slice(5)||'-'}</span><span>${t.description}</span><span class="category">${t.category}</span><span class="amount ${t.type}">${t.type==='income'?'+':'-'}${formatKRW(t.amount)}</span><span class="type-badge ${t.type==='income'?'in':'out'}">${t.type==='income'?'입금':'출금'}</span></div>`).join('');
}

function resetApp() {
  files = []; ledgerData = [];
  fileChips.innerHTML = '';
  analyzeBtn.disabled = true; analyzeBtn.style.display = 'flex';
  results.style.display = 'none'; errorMsg.style.display = 'none'; fileInput.value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function exportPDF() {
  if (!ledgerData.length) return;
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    doc.setFont('helvetica');
    doc.setFontSize(18);
    doc.text('Construction Ledger', 14, 22);
    doc.setFontSize(10); doc.setTextColor(130);
    doc.text('Date: ' + new Date().toLocaleDateString('ko-KR'), 14, 30);
    const income = ledgerData.filter(d => d.type === 'income').reduce((s, d) => s + d.amount, 0);
    const expense = ledgerData.filter(d => d.type === 'expense').reduce((s, d) => s + d.amount, 0);
    doc.setTextColor(0); doc.setFontSize(10);
    doc.text('Income: +' + formatKRW(income) + '   Expense: -' + formatKRW(expense) + '   Net: ' + formatKRW(income - expense), 14, 38);
    const pdfSorted = [...ledgerData].sort((a, b) => new Date(a.date) - new Date(b.date));
    doc.autoTable({
      startY: 44,
      head: [['날짜', '내용', '분류', '금액', '구분']],
      body: pdfSorted.map(t => [
        t.date || '-',
        t.description,
        t.category,
        (t.type === 'income' ? '+' : '-') + formatKRW(t.amount),
        t.type === 'income' ? '입금' : '출금'
      ]),
      styles: { fontSize: 9, cellPadding: 3 },
      headStyles: { fillColor: [26, 24, 20], textColor: 255 },
      alternateRowStyles: { fillColor: [245, 243, 239] },
      columnStyles: { 3: { halign: 'right' } }
    });
    doc.save('장부_' + new Date().toISOString().slice(0, 10) + '.pdf');
    showToast('PDF가 저장됐어요 ✓');
  } catch(e) { showToast('PDF 저장 오류: ' + e.message); }
}
</script>
</body>
</html>
